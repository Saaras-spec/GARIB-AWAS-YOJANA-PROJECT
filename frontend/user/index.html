<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Garib Awas Yojana</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ── Progress Tracker ── */
        .progress-tracker-card {
            background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.8); border-radius: 1.25rem; padding: 2rem 2.5rem;
            box-shadow: var(--shadow-sm); margin-bottom: 2rem;
        }
        .progress-tracker-title {
            font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.75rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .progress-steps { display: flex; align-items: flex-start; justify-content: space-between; position: relative; }
        .progress-steps::before { content: ''; position: absolute; top: 22px; left: 30px; right: 30px; height: 4px; background: #e5e7eb; border-radius: 2px; z-index: 0; }
        .progress-step { display: flex; flex-direction: column; align-items: center; gap: 0.65rem; position: relative; z-index: 1; flex: 1; }
        .step-circle { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; border: 3px solid #e5e7eb; background: white; color: #9ca3af; transition: all 0.4s; }
        .step-label { font-size: 0.82rem; font-weight: 600; color: #9ca3af; text-align: center; max-width: 110px; line-height: 1.3; }
        .step-completed .step-circle { background: linear-gradient(135deg, #138808, #16a34a); border-color: #138808; color: white; box-shadow: 0 4px 14px rgba(19,136,8,0.3); }
        .step-completed .step-label { color: #138808; }
        .step-current .step-circle { background: linear-gradient(135deg, #FF9933, #f59e0b); border-color: #FF9933; color: white; box-shadow: 0 4px 14px rgba(255,153,51,0.4); animation: pulse 2s infinite; }
        .step-current .step-label { color: #FF9933; font-weight: 700; }
        .step-future .step-circle { background: white; border-color: #e5e7eb; color: #d1d5db; }
        .step-future .step-label { color: #d1d5db; }
        @keyframes pulse { 0%,100% { box-shadow: 0 4px 14px rgba(255,153,51,0.4); } 50% { box-shadow: 0 4px 24px rgba(255,153,51,0.65); } }
        .progress-line-fill { position: absolute; top: 22px; left: 30px; height: 4px; background: linear-gradient(90deg, #138808, #16a34a); border-radius: 2px; z-index: 0; transition: width 0.6s; }

        /* ── Extra cards ── */
        .section-title { font-size: 1.15rem; font-weight: 700; color: var(--navy); margin: 2rem 0 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .countdown-card { padding: 1.5rem; }
        .countdown-value { font-size: 1.8rem; font-weight: 700; color: var(--navy); }
        .countdown-sub { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem; }

        /* Rating */
        .star-rating { display: flex; gap: 0.35rem; margin: 0.75rem 0; }
        .star-rating .star { font-size: 2rem; cursor: pointer; color: #d1d5db; transition: color 0.15s; }
        .star-rating .star.active { color: #f59e0b; }
        .star-rating .star:hover { color: #f59e0b; }
        .rating-readonly .star { cursor: default; }

        /* Installment table */
        table { width: 100%; border-collapse: collapse; }
        thead { background: rgba(249,250,251,0.5); }
        th { padding: 0.85rem 1rem; font-weight: 600; color: var(--navy); text-align: left; font-size: 0.85rem; }
        td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }

        /* Announcements */
        .announce-cards { display: flex; flex-direction: column; gap: 1rem; }
        .announce-mini { padding: 1.25rem; }
        .announce-mini h4 { color: var(--navy); margin-bottom: 0.25rem; font-size: 1rem; }
        .announce-mini p { font-size: 0.9rem; color: var(--text-primary); line-height: 1.4; margin-bottom: 0.35rem; }
        .announce-mini .meta { font-size: 0.78rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div id="app-container" class="app-container">
        <main class="main-content">
            <h1 class="page-title" id="welcome-message">Welcome, User</h1>

            <div class="metrics-grid">
                <div class="card" id="card-status">
                    <div class="card-title" id="status-title"><i data-lucide="check-circle"></i> Application Status</div>
                    <div class="card-value" id="user-status">Loading...</div>
                </div>
                <div class="card" id="card-officer">
                    <div class="card-title" style="color: var(--info);"><i data-lucide="shield-check"></i> Officer Assigned</div>
                    <div class="card-value" id="officer-name" style="font-size: 1.5rem; margin-top: 0.5rem; color: var(--navy);">Loading...</div>
                </div>
            </div>

            <!-- Progress Tracker -->
            <div class="progress-tracker-card">
                <div class="progress-tracker-title"><i data-lucide="git-branch" style="width:16px;height:16px;"></i> Application Progress</div>
                <div class="progress-steps" id="progress-steps">
                    <div class="progress-line-fill" id="progress-line-fill"></div>
                    <div class="progress-step" data-step="0"><div class="step-circle">1</div><div class="step-label">Registered</div></div>
                    <div class="progress-step" data-step="1"><div class="step-circle">2</div><div class="step-label">Pending Review</div></div>
                    <div class="progress-step" data-step="2"><div class="step-circle">3</div><div class="step-label">Under Construction</div></div>
                    <div class="progress-step" data-step="3"><div class="step-circle">4</div><div class="step-label">Completed</div></div>
                </div>
            </div>

            <!-- Feature 6: Expected Completion Countdown -->
            <div class="card countdown-card" id="countdown-card" style="display:none;margin-bottom:2rem;">
                <div class="card-title" style="color:var(--navy);"><i data-lucide="calendar-clock"></i> Expected Completion</div>
                <div class="countdown-value" id="countdown-value"></div>
                <div class="countdown-sub" id="countdown-sub"></div>
            </div>

            <!-- Feature 7: Satisfaction Rating -->
            <div class="card" id="rating-card" style="display:none;margin-bottom:2rem;">
                <div class="card-title" style="color:var(--saffron);"><i data-lucide="star"></i> Rate Your Experience</div>
                <div id="rating-content"></div>
            </div>

            <!-- Feature 8: Installment Status -->
            <h2 class="section-title" id="installment-title" style="display:none;">💰 Installment Status</h2>
            <div class="card" id="installment-card" style="display:none;padding:0;overflow:hidden;margin-bottom:2rem;">
                <table>
                    <thead><tr><th>Installment</th><th>Amount</th><th>Status</th><th>Released On</th></tr></thead>
                    <tbody id="installment-body"></tbody>
                </table>
            </div>

            <!-- Feature 9: Notice Board -->
            <h2 class="section-title">📢 Notice Board</h2>
            <div class="announce-cards" id="notice-board">
                <p style="color:var(--text-secondary);">Loading announcements...</p>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="./user-dashboard.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Officer - Garib Awas Yojana</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .chat-container {
            display: flex; flex-direction: column; height: 500px;
            background: rgba(249,250,251,0.5); border-radius: 1.25rem;
            border: 1px solid var(--border-color); overflow: hidden;
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .chat-bubble { max-width: 70%; padding: 0.85rem 1.1rem; border-radius: 1rem; font-size: 0.92rem; line-height: 1.45; word-wrap: break-word; }
        .chat-bubble.user { background: var(--saffron); color: white; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
        .chat-bubble.officer { background: #e5e7eb; color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 0.25rem; }
        .chat-time { font-size: 0.7rem; opacity: 0.7; margin-top: 0.25rem; }
        .chat-input-bar { display: flex; gap: 0.5rem; padding: 1rem; border-top: 1px solid var(--border-color); background: white; }
        .chat-input-bar input { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 0.75rem; font-family: inherit; font-size: 0.95rem; }
        .chat-input-bar input:focus { outline: none; border-color: var(--saffron); box-shadow: 0 0 0 3px rgba(255,153,51,0.15); }
        .btn-send { padding: 0.75rem 1.5rem; background: var(--saffron); color: white; border: none; border-radius: 0.75rem; cursor: pointer; font-weight: 600; font-family: inherit; font-size: 0.95rem; }
        .btn-send:hover { background: var(--primary-hover); }
        .chat-empty { text-align: center; color: var(--text-secondary); padding: 3rem; }
    </style>
</head>
<body>
    <div id="app-container" class="app-container">
        <main class="main-content">
            <h1 class="page-title">Message Officer</h1>
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="chat-empty">Loading messages...</div>
                </div>
                <div class="chat-input-bar">
                    <input type="text" id="chat-input" placeholder="Type your message..." />
                    <button class="btn-send" id="btn-send">Send</button>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="./messages.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>

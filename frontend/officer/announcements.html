<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - Garib Awas Yojana</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .announce-form { margin-bottom: 2rem; }
        .announce-list { display: flex; flex-direction: column; gap: 1rem; }
        .announce-card { position: relative; }
        .announce-card h3 { font-size: 1.1rem; color: var(--navy); margin-bottom: 0.35rem; }
        .announce-card p { color: var(--text-primary); font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.5rem; }
        .announce-meta { font-size: 0.8rem; color: var(--text-secondary); }
        .btn-delete-announce {
            position: absolute; top: 1.25rem; right: 1.25rem;
            padding: 0.4rem 0.8rem; background: rgba(220,38,38,0.1); color: var(--danger);
            border: 1px solid rgba(220,38,38,0.2); border-radius: 0.5rem;
            cursor: pointer; font-weight: 600; font-size: 0.8rem; font-family: inherit;
        }
        .btn-delete-announce:hover { background: rgba(220,38,38,0.2); }
    </style>
</head>
<body>
    <div id="app-container" class="app-container">
        <main class="main-content">
            <h1 class="page-title">Announcements</h1>
            <div class="form-container announce-form">
                <h2 style="font-size:1.15rem;color:var(--navy);margin-bottom:1rem;">📢 Post New Announcement</h2>
                <div id="announce-msg" style="display:none;margin-bottom:1rem;padding:0.75rem;border-radius:0.75rem;font-weight:600;"></div>
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" id="announce-title" class="form-input" placeholder="Announcement title" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea id="announce-message" class="form-input" rows="3" placeholder="Write your announcement..." required></textarea>
                </div>
                <button class="btn-primary" id="btn-post" style="max-width:200px;">Post Announcement</button>
            </div>

            <h2 style="font-size:1.15rem;color:var(--navy);margin-bottom:1rem;">Your Announcements</h2>
            <div class="announce-list" id="announce-list">
                <p style="color:var(--text-secondary);">Loading...</p>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="./announcements.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>

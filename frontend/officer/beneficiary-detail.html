<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beneficiary Details - Garib Awas Yojana</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        .detail-item label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
        .detail-item .val { font-size: 1.05rem; font-weight: 500; color: var(--navy); margin-top: 0.25rem; text-transform: capitalize; }
        .status-badge { padding: 0.4rem 0.85rem; border-radius: 999px; font-size: 0.85rem; font-weight: 700; display: inline-block; }
        .status-completed { background: rgba(19,136,8,0.1); color: var(--green); }
        .status-pending { background: rgba(255,153,51,0.1); color: var(--saffron); }
        .status-construction { background: rgba(0,0,128,0.1); color: var(--navy); }

        .section-title { font-size: 1.15rem; font-weight: 700; color: var(--navy); margin: 2rem 0 1rem; display: flex; align-items: center; gap: 0.5rem; }

        /* Installment table */
        table { width: 100%; border-collapse: collapse; }
        thead { background: rgba(249,250,251,0.5); }
        th { padding: 0.85rem 1rem; font-weight: 600; color: var(--navy); text-align: left; font-size: 0.85rem; }
        td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        .btn-release { padding: 0.4rem 0.9rem; background: var(--saffron); color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; font-family: inherit; font-size: 0.85rem; }
        .btn-release:hover { background: var(--primary-hover); }

        /* Chat UI */
        .chat-container { display: flex; flex-direction: column; height: 400px; background: rgba(249,250,251,0.5); border-radius: 1rem; border: 1px solid var(--border-color); overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .chat-bubble { max-width: 70%; padding: 0.75rem 1rem; border-radius: 1rem; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .chat-bubble.officer { background: var(--saffron); color: white; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
        .chat-bubble.user { background: #e5e7eb; color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 0.25rem; }
        .chat-time { font-size: 0.7rem; opacity: 0.7; margin-top: 0.25rem; }
        .chat-input-bar { display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid var(--border-color); background: white; }
        .chat-input-bar input { flex: 1; padding: 0.65rem 1rem; border: 1px solid var(--border-color); border-radius: 0.75rem; font-family: inherit; font-size: 0.9rem; }
        .chat-input-bar input:focus { outline: none; border-color: var(--saffron); }
        .btn-send { padding: 0.65rem 1.25rem; background: var(--saffron); color: white; border: none; border-radius: 0.75rem; cursor: pointer; font-weight: 600; font-family: inherit; }
        .btn-back { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .btn-back:hover { color: var(--saffron); }
    </style>
</head>
<body>
    <div id="app-container" class="app-container">
        <main class="main-content">
            <a href="/officer/manage" class="btn-back"><i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Back to Manage Records</a>
            <h1 class="page-title" id="page-title">Beneficiary Details</h1>
            <div class="card" id="detail-card" style="margin-bottom:2rem;">
                <div class="detail-grid" id="detail-grid"><p>Loading...</p></div>
            </div>

            <h2 class="section-title">💰 Installments</h2>
            <div class="card" style="padding:0;overflow:hidden;margin-bottom:2rem;">
                <table>
                    <thead><tr><th>Installment</th><th>Amount</th><th>Status</th><th>Released On</th><th>Action</th></tr></thead>
                    <tbody id="installment-body"><tr><td colspan="5" style="padding:1.5rem;text-align:center;color:var(--text-secondary);">Loading...</td></tr></tbody>
                </table>
            </div>

            <h2 class="section-title">💬 Chat with Beneficiary</h2>
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-bar">
                    <input type="text" id="chat-input" placeholder="Type a message..." />
                    <button class="btn-send" id="btn-send">Send</button>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="./beneficiary-detail.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>

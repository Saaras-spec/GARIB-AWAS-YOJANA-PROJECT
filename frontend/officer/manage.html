<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Records - Garib Awas Yojana</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Export libraries (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .banner {
            background-color: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--saffron);
            padding: 1.5rem;
            border-radius: 1.25rem;
            margin-bottom: 2rem;
            display: none;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
        }
        .banner-text { font-size: 1.05rem; color: var(--navy); }
        .banner-actions { display: flex; gap: 1rem; align-items: center; }
        .btn-undo {
            padding: 0.75rem 1.25rem;
            background: linear-gradient(135deg, var(--saffron) 0%, #e68a2e 100%);
            color: white; border: none; border-radius: 0.75rem; cursor: pointer;
            font-weight: 600; box-shadow: 0 4px 12px rgba(255, 153, 51, 0.3);
        }
        .btn-restore {
            padding: 0.75rem 1.25rem; background: white; color: var(--saffron);
            border: 2px solid var(--saffron); border-radius: 0.75rem; cursor: pointer;
            font-weight: 600; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .btn-dismiss {
            padding: 0.75rem 1.25rem; background: transparent; color: var(--text-secondary);
            border: 1px solid rgba(0, 0, 0, 0.15); border-radius: 0.75rem; cursor: pointer; font-weight: 600;
        }
        .status-badge { padding: 0.4rem 0.85rem; border-radius: 999px; font-size: 0.85rem; font-weight: 700; }
        .status-completed { background-color: rgba(19,136,8,0.1); color: var(--green); }
        .status-pending { background-color: rgba(255,153,51,0.1); color: var(--saffron); }
        .status-construction { background-color: rgba(0,0,128,0.1); color: var(--navy); }
        .action-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600; border: none; }
        .btn-start { background: linear-gradient(135deg, var(--navy) 0%, #3b82f6 100%); color: white; box-shadow: 0 4px 12px rgba(0,0,128,0.2); }
        .btn-mark { background: linear-gradient(135deg, var(--green) 0%, #10b981 100%); color: white; box-shadow: 0 4px 12px rgba(19,136,8,0.2); }
        .btn-move { background: #f3f4f6; color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-clear { background: var(--danger); color: white; box-shadow: 0 4px 12px rgba(220,38,38,0.2); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead { background-color: rgba(249, 250, 251, 0.5); border-bottom: 1px solid var(--border-color); }
        th { padding: 1.25rem 1.5rem; font-weight: 600; color: var(--navy); }
        td { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color); }
        .td-name { font-weight: 500; }
        .td-address { color: var(--text-secondary); }
        .td-actions { display: flex; gap: 0.75rem; align-items: center; }

        /* ── Filter Toolbar ── */
        .filter-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 1.25rem 1.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            box-shadow: var(--shadow-sm);
        }
        .filter-toolbar input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 0.7rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            font-size: 0.95rem;
            font-family: inherit;
            background: rgba(255,255,255,0.6);
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .filter-toolbar input[type="text"]:focus {
            outline: none;
            border-color: var(--saffron);
            box-shadow: 0 0 0 3px rgba(255,153,51,0.15);
        }
        .filter-toolbar select {
            padding: 0.7rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            font-size: 0.9rem;
            font-family: inherit;
            background: rgba(255,255,255,0.6);
            color: var(--text-primary);
            cursor: pointer;
            min-width: 150px;
            transition: border-color 0.2s;
        }
        .filter-toolbar select:focus {
            outline: none;
            border-color: var(--saffron);
        }

        /* ── Export Buttons ── */
        .export-actions {
            display: flex;
            gap: 0.75rem;
            margin-left: auto;
        }
        .btn-export {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.25rem;
            border: none;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            font-family: inherit;
        }
        .btn-export:hover {
            transform: translateY(-1px);
        }
        .btn-export:active {
            transform: scale(0.97);
        }
        .btn-export-pdf {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(220,38,38,0.25);
        }
        .btn-export-excel {
            background: linear-gradient(135deg, #138808 0%, #16a34a 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(19,136,8,0.25);
        }
    </style>
</head>
<body>
    <div id="app-container" class="app-container">
        <main class="main-content">
            <h1 class="page-title">Manage Records</h1>

            <div id="undo-banner" class="banner">
                <div class="banner-text" id="undo-text"></div>
                <div class="banner-actions">
                    <button id="btn-undo" class="btn-undo">Undo Action</button>
                    <button id="btn-restore-all" class="btn-restore" style="display: none;">Restore All</button>
                    <button id="btn-dismiss" class="btn-dismiss">Dismiss</button>
                </div>
            </div>

            <!-- Filter Toolbar (Feature 1) + Export Buttons (Feature 2) -->
            <div class="filter-toolbar">
                <input type="text" id="filter-search" placeholder="🔍 Search by name…" autocomplete="off">
                <select id="filter-status">
                    <option value="">All Statuses</option>
                    <option value="Pending">Pending</option>
                    <option value="Under Construction">Under Construction</option>
                    <option value="Completed">Completed</option>
                </select>
                <select id="filter-district">
                    <option value="">All Districts</option>
                    <!-- Populated dynamically -->
                </select>
                <select id="filter-income">
                    <option value="">All Incomes</option>
                    <option value="0-50000">₹0 – ₹50,000</option>
                    <option value="50000-100000">₹50,000 – ₹1,00,000</option>
                    <option value="100000+">₹1,00,000+</option>
                </select>
                <div class="export-actions">
                    <button class="btn-export btn-export-pdf" id="btn-export-pdf">
                        <i data-lucide="file-text" style="width:16px;height:16px;"></i> Export PDF
                    </button>
                    <button class="btn-export btn-export-excel" id="btn-export-excel">
                        <i data-lucide="table" style="width:16px;height:16px;"></i> Export Excel
                    </button>
                </div>
            </div>

            <div class="card" style="padding: 0; overflow: hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Address</th>
                            <th>Current Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="records-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="./manage.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>

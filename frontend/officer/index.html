<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Garib Awas Yojana</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        /* ── Notification Bell ── */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 1rem;
            position: relative;
        }
        .bell-wrapper {
            position: relative;
            cursor: pointer;
        }
        .bell-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.2s;
        }
        .bell-icon:hover {
            box-shadow: var(--shadow-md);
        }
        .bell-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .bell-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            width: 340px;
            max-height: 400px;
            overflow-y: auto;
            background: white;
            border-radius: 1rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            z-index: 100;
        }
        .bell-dropdown.open { display: block; }
        .bell-dropdown-header {
            padding: 1rem 1.25rem;
            font-weight: 700;
            color: var(--navy);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }
        .bell-dropdown-item {
            padding: 0.85rem 1.25rem;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-size: 0.88rem;
            color: var(--text-primary);
            line-height: 1.4;
        }
        .bell-dropdown-item:last-child { border-bottom: none; }
        .bell-dropdown-item .notif-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        .bell-dropdown-empty {
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .charts-section {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 1.25rem;
            padding: 1.75rem;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }
        .chart-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--saffron) 0%, var(--white) 50%, var(--green) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .chart-card:hover::before { opacity: 1; }
        .chart-card-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            max-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chart-wrapper canvas {
            max-height: 300px;
        }
        @media (max-width: 900px) {
            .charts-section { grid-template-columns: 1fr; }
        }

        /* ── Satisfaction Card ── */
        .card-satisfaction .card-value {
            color: var(--saffron);
            display: flex;
            align-items: baseline;
            gap: 0.35rem;
        }
        .card-satisfaction .rating-sub {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .card-satisfaction .rating-count {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 0.35rem;
        }
    </style>
</head>
<body>
    <div id="app-container" class="app-container">
        <!-- Sidebar injected via JS -->
        <main class="main-content">
            <!-- Bell Notification Icon -->
            <div class="top-bar">
                <div class="bell-wrapper" id="bell-wrapper">
                    <div class="bell-icon">
                        <i data-lucide="bell" style="width:20px;height:20px;color:var(--navy);"></i>
                    </div>
                    <div class="bell-badge" id="bell-badge" style="display:none;">0</div>
                    <div class="bell-dropdown" id="bell-dropdown">
                        <div class="bell-dropdown-header">Recent Notifications</div>
                        <div id="bell-dropdown-body">
                            <div class="bell-dropdown-empty">No notifications</div>
                        </div>
                    </div>
                </div>
            </div>

            <h1 class="page-title">Housing Scheme Overview</h1>
            <div class="metrics-grid">
                <div class="card card-total">
                    <div class="card-title">
                        <i data-lucide="home"></i> Total Enrolled
                    </div>
                    <div class="card-value" id="stats-total">0</div>
                </div>

                <div class="card card-pending">
                    <div class="card-title" style="color: var(--warning);">
                        <i data-lucide="clock"></i> Pending
                    </div>
                    <div class="card-value" id="stats-pending">0</div>
                </div>

                <div class="card card-construction">
                    <div class="card-title">
                        <i data-lucide="construction"></i> Under Construction
                    </div>
                    <div class="card-value" id="stats-underConstruction">0</div>
                </div>

                <div class="card card-completed">
                    <div class="card-title" style="color: var(--green);">
                        <i data-lucide="check-circle-2"></i> Completed
                    </div>
                    <div class="card-value" id="stats-completed">0</div>
                </div>

                <!-- Feature 7: Average Satisfaction Rating -->
                <div class="card card-satisfaction">
                    <div class="card-title" style="color: var(--saffron);">
                        <i data-lucide="star"></i> Average Satisfaction
                    </div>
                    <div class="card-value">
                        <span id="avg-rating-value">⭐ 0</span>
                        <span class="rating-sub">/ 5</span>
                    </div>
                    <div class="rating-count" id="rating-count">0 ratings received</div>
                </div>
            </div>

            <!-- Analytics Charts -->
            <div class="charts-section">
                <div class="chart-card">
                    <div class="chart-card-title">
                        <i data-lucide="pie-chart" style="width:16px;height:16px;"></i> Status Distribution
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-card-title">
                        <i data-lucide="bar-chart-3" style="width:16px;height:16px;"></i> Month-wise Registrations
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="registrationChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="./dashboard.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
